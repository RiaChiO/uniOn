services:
  db:
    image: postgres:16-alpine
    container_name: gnumatchclub-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: gnumatchclub
      POSTGRES_USER: gnu_DB
      POSTGRES_PASSWORD: gnublank4898
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gnu_DB -d gnumatchclub"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:
